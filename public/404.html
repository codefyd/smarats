<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smarats</title>
  <script>
    // SPA redirect trick for GitHub Pages
    // يحوّل المسارات العميقة (مثل /s/abc) إلى index.html مع preserving للمسار
    var segmentCount = 1; // عدل إلى 0 إذا كان النطاق مخصصاً (custom domain)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
